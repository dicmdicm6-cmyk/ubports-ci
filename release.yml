name: Create Release

on:
  workflow_run:
    workflows: ["Build System Image"]
    types:
      - completed
    branches:
      - master
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    # 이전 빌드 워크플로우가 성공했을 때만 실행
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write # 릴리스 생성을 위해 반드시 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts # 빌드된 모든 이미지가 이 폴더 하위로 다운로드됨

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}
          name: Halium Build ${{ steps.date.outputs.date }}
          body: |
            Automated Halium 11.0 build for Xiaomi Pad 4 (clover)
            
            **Build Date:** ${{ steps.date.outputs.date }}
            **Triggered by:** ${{ github.event.workflow_run.head_sha }}
            
            ## Installation
            1. Flash `halium-boot.img` via fastboot.
            2. Follow the UBports installation guide for the rootfs.
          draft: false
          prerelease: false
          # 하위 폴더에 흩어진 모든 .img 파일을 찾아 릴리스에 첨부
          files: |
            ./artifacts/**/*.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
