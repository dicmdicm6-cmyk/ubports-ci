name: Build System Image

on: 
  push:
    branches:
      - master
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04 # 최신 GitHub 러너 환경으로 고정

    env:
      VENDOR: xiaomi
      DEVICE: clover
      ANDROID_ROOT: /home/runner/work/halium/

    steps:        
    - name: Checkout
      uses: actions/checkout@v4 # v4로 업데이트 (Node 20 호환)

    - name: Cleanup Disk
      uses: HandsomeYingyan/cleanup-disk-action@v3.0

    - name: Initialization environment
      run: |
        sudo apt-get update
        # 최신 Ubuntu 24.04에 맞춘 패키지명 변경
        sudo apt-get install -y \
        openjdk-8-jdk android-tools-adb bc \
        bison build-essential curl flex g++-multilib \
        gcc-multilib gnupg gperf imagemagick lib32ncurses-dev \
        lib32readline-dev lib32z1-dev liblz4-tool \
        libncurses-dev libsdl1.2-dev libssl-dev libwxgtk3.2-dev \
        libxml2 libxml2-utils lzop pngcrush rsync schedtool \
        squashfs-tools xsltproc yasm zip zlib1g-dev git python3 python3-dev \
        python-is-python3
        
        # 에러 방지를 위해 || true 추가
        sudo docker rmi `docker images -q` || true
        sudo rm -rf \
          /usr/share/dotnet \
          /etc/mysql \
          /etc/php
          
        mkdir -p ~/bin
        wget 'https://storage.googleapis.com/git-repo-downloads/repo' -P ~/bin
        chmod +x ~/bin/repo
        git config --global user.name "UBports Xiaomi Pad 4 CI"
        git config --global user.email "thisemaildoesnotexist@exist.com"
        mkdir -p $ANDROID_ROOT
        
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
         root-reserve-mb: 1024
         swap-size-mb: 512
         build-mount-path: '${{ env.ANDROID_ROOT }}'

    - name: Downloading source code
      run: |
        source halium.env || true
        cd $ANDROID_ROOT
        # repo 명령어가 환경변수에 안 잡힐 수 있으므로 절대경로 지정
        ~/bin/repo init -u https://github.com/Halium/android -b halium-9.0 --depth=1
        mkdir -p $ANDROID_ROOT/.repo/local_manifests
        wget https://raw.githubusercontent.com/ubuntu-touch-clover/local_manifests/halium-9.0/$DEVICE.xml -O $ANDROID_ROOT/.repo/local_manifests/$DEVICE.xml
        ~/bin/repo sync -j8 -c --no-clone-bundle --no-tags
    
    - name: Build HAL
      run: |
        # Ubuntu 24.04의 python2 부재 해결을 위한 수동 링크 처리
        sudo apt-get install -y python2 || true
        sudo ln -sf /usr/bin/python2 /usr/bin/python || true
        chmod +x build-hal.sh
        bash -x build-hal.sh
      shell: bash

    - name: Upload boot image
      uses: actions/upload-artifact@v4 # v4로 업데이트
      with:
        name: halium-boot-image
        path: /home/runner/work/halium/out/target/product/clover/halium-boot.img

    - name: Upload system image
      uses: actions/upload-artifact@v4 # v4로 업데이트
      with:
         name: system-image
         path: /home/runner/work/halium/out/target/product/clover/system.img

    - name: Upload vendor image
      uses: actions/upload-artifact@v4 # v4로 업데이트
      with:
         name: vendor-image
         path: /home/runner/work/halium/out/target/product/clover/vendor.img
